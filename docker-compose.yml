version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://mongo:27017/grain-admin
      JWT_SECRET: ${JWT_SECRET:-your-dev-secret-key}
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
      NODE_ENV: production
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - grain-network

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-rootpassword}
      MONGO_INITDB_DATABASE: grain-admin
    volumes:
      - mongo_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    restart: unless-stopped
    networks:
      - grain-network

  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-rootpassword}
      ME_CONFIG_MONGODB_URL: mongodb://root:${MONGO_PASSWORD:-rootpassword}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-admin123}
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - grain-network

volumes:
  mongo_data:

networks:
  grain-network:
    driver: bridge
